<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direct Digital Designs Logo</title>
    <style>
      :root {
        --shadow: rgba(17, 24, 39, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 24% 18%, rgba(255, 183, 3, 0.18), transparent 20%),
          radial-gradient(circle at 76% 22%, rgba(58, 134, 255, 0.16), transparent 24%),
          linear-gradient(180deg, #fcf7ef 0%, #f4eee4 100%);
        font-family: "Outfit", "Segoe UI", sans-serif;
      }

      .logo-wrap {
        display: grid;
        place-items: center;
        width: 320px;
        height: 320px;
      }

      .logo-shell {
        display: grid;
        place-items: center;
        width: 240px;
        height: 240px;
      }

      .logo-video {
        display: block;
        width: 224px;
        height: 224px;
        object-fit: contain;
        background: transparent;
        filter: drop-shadow(0 18px 32px var(--shadow));
        transition: transform 180ms ease, filter 180ms ease;
      }

      .logo-shell:hover .logo-video,
      .logo-shell:focus-within .logo-video {
        transform: translateY(-1px) scale(1.02);
        filter: drop-shadow(0 22px 38px rgba(17, 24, 39, 0.18));
      }
    </style>
  </head>
  <body>
    <div class="logo-wrap">
      <div class="logo-shell">
        <video class="logo-video" muted playsinline preload="auto">
          <source src="logo-hover.mp4" type="video/mp4" />
        </video>
      </div>
    </div>

    <script>
      const logoShell = document.querySelector(".logo-shell");
      const logoVideo = document.querySelector(".logo-video");

      if (logoShell && logoVideo) {
        const previewFrameTime = 0.01;

        const resetLogoVideo = () => {
          logoVideo.pause();

          try {
            logoVideo.currentTime = previewFrameTime;
          } catch {
            // Ignore seek timing errors until metadata is ready.
          }
        };

        const playLogoVideo = () => {
          try {
            logoVideo.currentTime = 0;
          } catch {
            // Ignore seek timing errors until metadata is ready.
          }

          const playPromise = logoVideo.play();

          if (playPromise) {
            playPromise.catch(() => {});
          }
        };

        logoVideo.addEventListener("loadeddata", resetLogoVideo);
        logoVideo.addEventListener("ended", resetLogoVideo);
        logoShell.addEventListener("pointerenter", playLogoVideo);
        logoShell.addEventListener("pointerleave", resetLogoVideo);
      }
    </script>
  </body>
</html>
